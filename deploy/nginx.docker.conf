# Production Nginx for Docker web stage: HTTPS in container; certs from host via compose (NGINX_SSL_CERT_DIR).

upstream qingjialu_api {
    server api:3001;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/qjl.textengine.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qjl.textengine.cn.key;

    client_max_body_size 100m;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://qingjialu_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://qingjialu_api/health;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
