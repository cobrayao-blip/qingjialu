# 清嘉录 生产编排（PostgreSQL + API + Nginx HTTPS）
# Nginx 配置路径：deploy/nginx.docker.conf（由 Dockerfile 打入镜像）。
#
#   docker compose -f docker-compose.prod.yml --env-file .env.docker.prod up -d --build
#
# 自检：grep QJL_COMPOSE_LAYOUT docker-compose.prod.yml
#       grep -nE 'context:|dockerfile:' docker-compose.prod.yml
# down / ps / logs 也需：--env-file .env.docker.prod（或复制为同目录 .env）
# 证书：NGINX_SSL_CERT_DIR，默认宿主 /data/qjl/app/cert → 容器 /etc/nginx/ssl
# 数据库：未设 PGDATA_HOST_PATH 时用命名卷 qjlpg_prod；生产建议在 .env 写 PGDATA_HOST_PATH=/data/qjl/pgdata
#
# QJL_COMPOSE_LAYOUT=repo-root-v3

name: qingjialu

services:
  db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-qingjialu}
      POSTGRES_USER: ${PG_USER:-qingjialu}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
    volumes:
      - ${PGDATA_HOST_PATH:-qjlpg_prod}:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qingjialu} -d ${PG_DATABASE:-qingjialu}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: api
    environment:
      NODE_ENV: production
      PORT: "3001"
      PG_HOST: db
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-qingjialu}
      PG_PASSWORD: ${PG_PASSWORD:?}
      PG_DATABASE: ${PG_DATABASE:-qingjialu}
      JWT_SECRET: ${JWT_SECRET:?}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_SSL_CERT_DIR:-/data/qjl/app/cert}:/etc/nginx/ssl:ro
    restart: unless-stopped

volumes:
  qjlpg_prod:
