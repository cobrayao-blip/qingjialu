# 生产部署（与 docker-compose.yml 的开发模式分离）
#
# 准备：
#   1. 挂载数据盘到 /data（见《部署手册》）
#   2. sudo mkdir -p /data/qjl/pgdata && sudo chown 70:70 /data/qjl/pgdata   # postgres:16-alpine 默认 UID 多为 70；若起不来见手册「权限」
#   3. cp .env.docker.prod.example .env.docker.prod && 编辑密钥
#
# 启动：
#   docker compose -f docker-compose.prod.yml --env-file .env.docker.prod up -d --build
#
# 访问：http://服务器IP 或 域名（同域 /api，勿设 VITE_API_BASE）

services:
  db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-qingjialu}
      POSTGRES_USER: ${PG_USER:-qingjialu}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
    volumes:
      - ${PGDATA_HOST_PATH:-qjlpg_prod}:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qingjialu} -d ${PG_DATABASE:-qingjialu}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: api
    environment:
      NODE_ENV: production
      PORT: "3001"
      PG_HOST: db
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-qingjialu}
      PG_PASSWORD: ${PG_PASSWORD:?}
      PG_DATABASE: ${PG_DATABASE:-qingjialu}
      JWT_SECRET: ${JWT_SECRET:?}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

volumes:
  qjlpg_prod:
